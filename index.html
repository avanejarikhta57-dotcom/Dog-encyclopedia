<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 Dog Breed Encyclopedia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <header class="header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-paw">🐾</span>
          <div>
            <h1>Dog Breed Encyclopedia</h1>
            <p class="header-sub">Explore hundreds of breeds from around the world</p>
          </div>
        </div>
        <button id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
      </div>
    </header>

    <div class="controls-wrapper">
      <div class="controls">

        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by breed name..."
            autocomplete="off"
          />
        </div>

        <select id="sortSelect" class="control-select">
          <option value="default">Sort by…</option>
          <option value="name-asc">Name A → Z</option>
          <option value="name-desc">Name Z → A</option>
          <option value="weight-asc">Weight ↑</option>
          <option value="weight-desc">Weight ↓</option>
          <option value="lifespan-asc">Lifespan ↑</option>
          <option value="lifespan-desc">Lifespan ↓</option>
        </select>

        <select id="sizeFilter" class="control-select">
          <option value="all">All Sizes</option>
          <option value="small">Small (0–10 kg)</option>
          <option value="medium">Medium (11–25 kg)</option>
          <option value="large">Large (26+ kg)</option>
        </select>

        <button id="favToggle" class="fav-toggle-btn">Show Favorites</button>

      </div>

      <p id="resultCount" class="result-count"></p>
    </div>

    <main class="container">
      <div id="status" class="status"></div>
      <section id="breedContainer" class="breed-grid"></section>
    </main>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-box">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
